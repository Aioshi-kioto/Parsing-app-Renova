services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: renova
      POSTGRES_USER: renova
      POSTGRES_PASSWORD: renova_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data_dev:
